name: Build RTL8821AU Module (Android ARM64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            bc \
            build-essential \
            flex \
            bison \
            libssl-dev \
            libelf-dev \
            clang \
            llvm \
            lld \
            gcc-aarch64-linux-gnu

      - name: Clone driver
        run: |
          git clone --depth=1 https://github.com/morrownr/8821au-20210708.git driver

      - name: Download Linux kernel source
        run: |
          git clone --depth=1 --branch v5.10 https://github.com/torvalds/linux.git kernel

      - name: Prepare kernel headers
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LD=ld.lld
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          make defconfig
          make modules_prepare

      - name: Patch USB ID (TP-Link 2357:0120)
        run: |
          sed -i '/0x2357, 0x011e/a \    {USB_DEVICE(0x2357, 0x0120), .driver_info = RTL8821},' driver/os_dep/linux/usb_intf.c || true

      - name: Configure driver for Android ARM64
        run: |
          cd driver
          sed -i 's/CONFIG_PLATFORM_I386_PC = y/CONFIG_PLATFORM_I386_PC = n/' Makefile || true
          sed -i 's/CONFIG_PLATFORM_ARM_RPI = y/CONFIG_PLATFORM_ARM_RPI = n/' Makefile || true
          sed -i 's/CONFIG_PLATFORM_ARM64_RPI = n/CONFIG_PLATFORM_ARM64_RPI = y/' Makefile || true

      - name: Build RTL8821AU module
        run: |
          export ARCH=arm64
          export CC=clang
          export LD=ld.lld
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-

          make -C kernel \
          M=$GITHUB_WORKSPACE/driver \
          ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          LLVM=1 \
          LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          modules

      - name: Show built modules
        run: |
          find driver -name "*.ko"

      - name: Upload module
        uses: actions/upload-artifact@v4
        with:
          name: rtl8821au-driver
          path: |
            driver/*.ko
            driver/**/*.ko
