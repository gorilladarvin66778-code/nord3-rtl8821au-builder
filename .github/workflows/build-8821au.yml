name: Build RTL8821AU Module (Android ARM64 Optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            build-essential \
            bc \
            flex \
            bison \
            libssl-dev \
            libelf-dev \
            clang \
            llvm \
            lld \
            gcc-aarch64-linux-gnu

      - name: Clone driver source
        run: |
          git clone --depth=1 https://github.com/morrownr/8821au-20210708.git driver

      - name: Download Linux Kernel Source (5.10 base)
        run: |
          git clone --depth=1 --branch v5.10 https://github.com/torvalds/linux.git kernel

      - name: Prepare kernel tree
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LD=ld.lld
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export HOSTCC=clang
          export HOSTCXX=clang++
          make defconfig
          make modules_prepare

      - name: Patch USB ID for TP-Link 2357:0120
        run: |
          if ! grep -q "0x2357, 0x0120" driver/os_dep/linux/usb_intf.c; then
            sed -i '/0x2357, 0x011e/a \    {USB_DEVICE(0x2357, 0x0120), .driver_info = RTL8821},' driver/os_dep/linux/usb_intf.c
          fi

      - name: Patch driver for Android ARM64
        run: |
          cd driver
          sed -i 's/^CONFIG_PLATFORM_I386_PC = y/CONFIG_PLATFORM_I386_PC = n/' Makefile || true
          sed -i 's/^CONFIG_PLATFORM_ARM_RPI = y/CONFIG_PLATFORM_ARM_RPI = n/' Makefile || true
          sed -i 's/^CONFIG_PLATFORM_ARM64_RPI = n/CONFIG_PLATFORM_ARM64_RPI = y/' Makefile || true
          sed -i 's/^USER_EXTRA_CFLAGS += -Werror/# USER_EXTRA_CFLAGS += -Werror/' Makefile || true

      - name: Show driver files
        run: |
          ls -la driver
          find driver -maxdepth 2 -type f | sort | head -200

      - name: Build module
        run: |
          cd driver
          export ARCH=arm64
          export CC=clang
          export LD=ld.lld
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export HOSTCC=clang
          export HOSTCXX=clang++
          make -C ../kernel M=$(pwd) \
            ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            modules

      - name: Locate built modules
        run: |
          echo "Searching for built .ko files..."
          find driver -type f -name "*.ko" | sort

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtl8821au-module
          path: |
            driver/*.ko
            driver/**/*.ko
