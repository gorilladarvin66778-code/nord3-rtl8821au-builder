name: Nord3 RTL8821AU Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git bc bison build-essential flex \
            libssl-dev libelf-dev wget \
            clang lld llvm

      - name: Clone Nord3 kernel source
        run: |
          git clone --depth=1 \
            https://github.com/OnePlusOSS/android_kernel_5.10_oneplus_mt6983 \
            -b oneplus/mt6983_v_15.0.0_nord_3 kernel

      - name: Clone Nord3 kernel modules
        run: |
          git clone --depth=1 \
            https://github.com/OnePlusOSS/android_kernel_modules_oneplus_mt6983 \
            -b oneplus/mt6983_v_15.0.0_nord_3 modules

      - name: Merge vendor modules
        run: |
          cp -r modules/* kernel/ || true

      - name: Copy Nord3 configuration
        run: |
          cp config/nord3_defconfig kernel/.config

      - name: Prepare kernel configuration
        run: |
          cd kernel

          # Remove broken Oplus vendor Kconfig source lines from all Kconfig files
          find . -type f \( -name 'Kconfig' -o -name 'Kconfig.*' \) -print0 | \
          xargs -0 sed -i '/source ".*oplus.*Kconfig"/d'

          make ARCH=arm64 LLVM=1 olddefconfig
          make ARCH=arm64 LLVM=1 prepare
          make ARCH=arm64 LLVM=1 modules_prepare

      - name: Clone RTL8821AU driver
        run: |
          git clone --depth=1 \
            https://github.com/morrownr/8821au-20210708 driver

      - name: Patch driver for ARM64
        run: |
          cd driver
          sed -i 's/CONFIG_PLATFORM_I386_PC = y/CONFIG_PLATFORM_I386_PC = n/' Makefile || true
          sed -i 's/CONFIG_PLATFORM_ARM64_RPI = n/CONFIG_PLATFORM_ARM64_RPI = y/' Makefile || true
          sed -i 's/USER_EXTRA_CFLAGS += -Werror/# USER_EXTRA_CFLAGS += -Werror/' Makefile || true

      - name: Show driver files
        run: |
          ls -la driver
          find driver -name "*.c" | head

      - name: Build RTL8821AU module
        run: |
          cd driver
          make ARCH=arm64 LLVM=1 -C ../kernel M=$(pwd) modules

      - name: Locate built modules
        run: |
          find driver -name "*.ko"

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtl8821au-module
          path: driver/**/*.ko
