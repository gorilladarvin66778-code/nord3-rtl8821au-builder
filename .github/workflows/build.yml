name: Build RTL8821AU Module

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git bc flex bison libssl-dev

      - name: Clone driver
        run: |
          git clone https://github.com/aircrack-ng/rtl8812au.git
          cd rtl8812au

      - name: Patch Makefile
        run: |
          cd rtl8812au
          sed -i 's/CONFIG_PLATFORM_I386_PC = y/CONFIG_PLATFORM_I386_PC = n/' Makefile
          sed -i 's/CONFIG_PLATFORM_ARM64_RPI = n/CONFIG_PLATFORM_ARM64_RPI = y/' Makefile
          sed -i 's/USER_EXTRA_CFLAGS += -Werror/# USER_EXTRA_CFLAGS += -Werror/' Makefile

      - name: Build module
        run: |
          cd rtl8812au
          make -j$(nproc)

      - name: Upload module
        uses: actions/upload-artifact@v4
        with:
          name: rtl8821au-module
          path: rtl8812au/*.ko
