name: Nord3 RTL8821AU Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git bc bison build-essential flex libssl-dev libelf-dev wget

    - name: Clone Nord3 kernel source
      run: |
        git clone --depth=1 https://github.com/OnePlusOSS/android_kernel_5.10_oneplus_mt6983 -b oneplus/mt6983_v_15.0.0_nord_3 kernel

    - name: Clone Nord3 kernel modules
      run: |
        git clone https://github.com/OnePlusOSS/android_kernel_modules_oneplus_mt6983 -b oneplus/mt6983_v_15.0.0_nord_3 modules

    - name: Merge vendor modules
      run: |
        cp -r modules/* kernel/

    - name: Clone RTL8821AU driver
      run: |
        git clone https://github.com/morrownr/8821au-20210708 driver

    - name: Prepare kernel
      run: |
        cd kernel
        make defconfig || true

    - name: Build RTL8821AU module
      run: |
        cd driver
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C ../kernel M=$(pwd) modules || true

    - name: Upload module
      uses: actions/upload-artifact@v4
      with:
        name: rtl8821au-module
        path: driver/*.ko
